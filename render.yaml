services:
  - type: web
    name: wc2026-predictor-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT -w 1 --timeout 120 --graceful-timeout 120
    envVars:
      - key: CORS_ALLOW_ALL
        value: "true"
      - key: N_SIMULATIONS
        value: "10000"
      - key: TRAINING_YEARS
        value: "4"
